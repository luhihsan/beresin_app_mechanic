name: mechanic_app
description: "Aplikasi Mobile Mekanik - Ekosistem Beresin Garasi"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  
  # State Management & DI
  flutter_bloc: ^8.1.3
  get_it: ^7.6.0
  injectable: ^2.4.2

  # Firebase Core & Storage/Database
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.1
  firebase_auth: ^5.1.0
  http: ^1.6.0

  # Data Modeling & Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1

  firebase_storage: 12.4.10
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generators
  build_runner: ^2.4.9
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - secret.json